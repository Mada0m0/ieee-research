# Piezoelectric control research direction configuration
# for ieee-search v2.0 daily_digest
# Location: ~/.hermes/skills/research/ieee-search/templates/research_domains.yaml

research_domains:

  "Piezoelectric actuator hysteresis control":
    keywords:
      - "piezoelectric actuator hysteresis control"
      - "piezoelectric precision positioning compensation"
      - "piezo-driven mechanism hysteresis"
      - "piezoelectric stage control compensation"
    semantic_scholar_fields:
      - "Engineering"
      - "Physics"
    venue_filters:
      - "IEEE"
      - "Elsevier"
      - "IOP"
    priority: 10
    min_citations: 0
    year_start: 2018
    description: "Nonlinear hysteresis modeling and precision positioning control of piezoelectric actuators"

  "Bouc-Wen Hysteresis Inverse Model and Compensation":
    keywords:
      - "Bouc-Wen hysteresis model"
      - "Bouc-Wen inverse compensation"
      - "rate-dependent Bouc-Wen hysteresis"
      - "Bouc-Wen parameter identification"
      - "modified Bouc-Wen model"
    semantic_scholar_fields:
      - "Engineering"
      - "Mathematics"
    venue_filters:
      - "IEEE"
      - "Elsevier"
      - "SAGE"
    priority: 10
    min_citations: 0
    year_start: 2015
    description: "Parameter identification, inverse model construction and compensation control of Bouc-Wen hysteresis model"

  "PMN material piezoelectric actuator":
    keywords:
      - "PMN-PT actuator piezoelectric"
      - "lead magnesium niobate piezoelectric"
      - "PMN material actuator control"
      - "relaxor ferroelectric piezoelectric actuator"
      - "PMN-PT hysteresis"
    semantic_scholar_fields:
      - "Materials Science"
      - "Engineering"
      - "Physics"
    venue_filters:
      - "IEEE"
      - "IOP"
      - "AIP"
    priority: 8
    min_citations: 0
    year_start: 2010
    description: "Application and hysteresis characteristics of relaxor ferroelectric materials such as PMN-PT in piezoelectric actuators"

  "Hysteresis Modeling and Compensation (General)":
    keywords:
      - "hysteresis modeling Preisach"
      - "Prandtl-Ishlinskii hysteresis model"
      - "hysteresis compensation control method"
      - "nonlinear hysteresis identification"
      - "hysteresis inverse model feedforward"
      - "Krasnoselskii-Pokrovskii hysteresis"
    semantic_scholar_fields:
      - "Engineering"
      - "Mathematics"
    venue_filters:
      - "IEEE"
      - "Elsevier"
    priority: 7
    min_citations: 1
    year_start: 2018
    description: "General hysteresis modeling method (Preisach/PI/KP) and compensation strategy"

  "Adaptive and Robust Control (Piezoelectric)":
    keywords:
      - "adaptive control piezoelectric actuator"
      - "robust control hysteresis compensation"
      - "sliding mode control piezoelectric"
      - "model predictive control precision positioning"
      - "iterative learning control piezoelectric"
    semantic_scholar_fields:
      - "Engineering"
    venue_filters:
      - "IEEE"
      - "Elsevier"
    priority: 6
    min_citations: 2
    year_start: 2018
    description: "Application of advanced control algorithms (adaptive/robust/sliding mode/MPC/ILC) on piezoelectric platforms"

  "Shear Mode Piezo Actuator":
    keywords:
      - "shear mode piezoelectric actuator"
      - "shear deformation piezoelectric"
      - "d15 mode piezoelectric actuator"
      - "shearing piezoelectric actuator control"
    semantic_scholar_fields:
      - "Engineering"
      - "Materials Science"
    venue_filters:
      - "IEEE"
      - "Elsevier"
    priority: 5
    min_citations: 0
    year_start: 2010
    description: "Design and control of piezoelectric actuator in shear deformation mode"

output:
  language: "zh"
  max_papers_per_domain: 8
  max_total_papers: 45
  api_timeout: 20
  rate_limit_delay: 1.5
  enable_notion_export: true
  enable_obsidian_export: false
  obsidian_vault_path: ""
  notion_parent_page_hint: "Bouc-Wen"

notion:
  create_per_domain_page: false
  create_summary_page: true
  auto_create_links_table: true
  use_callout_for_metadata: true
  use_toggle_for_details: true
  use_table_for_relevance: true

report:
  include_tldr: true
  include_abstract_full: true
  include_methodology_breakdown: true
  include_relevance_scoring: true
  include_citation_network: false
  max_abstract_length: 1200
  highlight_high_relevance: true
